<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
    <a href="/" class="header__logo-link"><img class="header__logo" src="img/logo.svg" alt="Logo"></a>
    <nav class="header__nav">
        <ul class="header__nav-list">
            <li class="header__nav-item"><a href="#" class="active header__nav-link">Home</a></li>
            <li class="header__nav-item"><a href="#" class="header__nav-link">Pages</a></li>
            <li class="header__nav-item"><a href="#" class="header__nav-link">Podcast</a></li>
            <li class="header__nav-item"><a href="#" class="header__nav-link">Blog</a></li>
            <li class="header__nav-item"><a href="#" class="header__nav-link">Shop</a></li>
        </ul>
    </nav>
    <div class="header__left-zone">
        <div class="header__left-zone-search">
            <img class="header__left-zone-search-icon" src="img/header/search glass.svg" alt="Search">
            <span class="header__left-zone-search-text">Search</span>
        </div>
        
        <button class="header__left-zone-burger" aria-label="Menu">
            <div class="header__burger-row">
                <span class="header__burger-dot"></span>
                <span class="header__burger-dot"></span>
                <span class="header__burger-dot"></span>
            </div>
            <div class="header__burger-row">
                <span class="header__burger-dot"></span>
                <span class="header__burger-dot"></span>
                <span class="header__burger-dot"></span>
            </div>
            <div class="header__burger-row">
                <span class="header__burger-dot"></span>
                <span class="header__burger-dot"></span>
                <span class="header__burger-dot"></span>
            </div>
        </button>
    </header>

    <main>
        <section class="episode">
            <img class="episode__background" src="img/episode/episode-background.png" alt="image episode">
            <div class="container episode__container">
                <div class="episode__greetings">
                    <h1 class="episode__greetings-title">New episode available now</h1>
                    <p class="episode__greetings-text">Available on Apple Soundcast and Spotify.</p>
                    <div class="episode__greetings-buttons">
                        <button class="button episode__icon-btn">
                            <img class="episode__icon-img" src="img/episode/episode-aple.svg" alt="Apple Podcast">
                        </button>
                        <button class="button episode__icon-btn">
                            <img class="episode__icon-img" src="img/episode/episode-soundcloud.svg" alt="Soundcloud">
                        </button>
                    </div>
                </div>
                <div class="episode__card">
                        <div class="container episode__player">
                            <div class="episode__player-avatar">
                                <img class="episode__player-img" src="img/episode/player-timmy.png" alt="Timmy Mike">
                            </div>
                        
                            <div class="episode__player-details">
                                <div class="episode__player-details-description">
                                    <div class="episode__player-details-title">
                                        <h3 class="episode__player-title">Timmy Mike: the nature of design</h3>
                                        <div class="episode__player-meta">
                                            <span class="player-meta episode__player-episode">Episode 1</span>
                                            <span class="player-meta episode__player-separator">•</span>
                                            <span class="player-meta episode__player-topic">Microphone</span>
                                            <span class="player-meta episode__player-separator">•</span>
                                            <span class="player-meta episode__player-duration-total">0:13</span>
                                        </div>
                                    </div>
                                    <div class="episode__player-details-episode-page">
                                        <a href="/" class="episode-page-text">Episode page</a>
                                        <img class="episode-page-icon" src="img/icon/frame-icon.svg" alt="">
                                    </div>
                                </div>
                                
                            
                                <div class="episode__player-controls">
                                    <div class="episode__player-live">
                                        <div class="episode__player-live-dot"></div>
                                        <span class="episode__player-live-tag margin">10s</span>
                                        <span class="episode__player-live-tag">10s</span>
                                    </div>
                                
                                    <div class="episode__player-audio">
                                        <div class="episode__player-progress">
                                            <div class="episode__player-progress-bar">
                                                <div class="episode__player-progress-handle"></div>
                                                <div class="episode__player-progress-filled"></div>
                                            </div>
                                            <div class="episode__player-time">
                                                <span class="player-time episode__player-time-current">00:00</span>
                                                <span class="player-time episode__player-time-sep">/</span>
                                                <span class="player-time episode__player-time-total">00:00</span>
                                            </div>
                                        </div>
                                        <button class="button episode__player-sound" aria-label="Sound">
                                            <img class="episode__player-sound-icon" src="img/episode/player-sound.svg" alt="Volume">
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
